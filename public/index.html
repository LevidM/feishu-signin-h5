<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>现场签到</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f0f1a;
      --card: #ffffff;
      --primary: #6c5ce7;
      --primary-glow: rgba(108,92,231,0.25);
      --accent: #fd79a8;
      --text: #1d2129;
      --text-secondary: #4e5969;
      --text-tertiary: #86909c;
      --border: #e5e6eb;
      --success: #00b894;
      --success-bg: #e6faf2;
      --warning: #e6a23c;
      --warning-bg: #fdf6ec;
      --red: #e17055;
      --red-bg: #fef0ed;
      --radius: 10px;
      --radius-lg: 18px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: -apple-system, 'PingFang SC', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Ambient glow ── */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
    }

    body::before {
      width: 400px;
      height: 400px;
      top: -100px;
      right: -100px;
      background: rgba(108,92,231,0.15);
    }

    body::after {
      width: 300px;
      height: 300px;
      bottom: -80px;
      left: -80px;
      background: rgba(253,121,168,0.10);
    }

    .container {
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 24px rgba(0,0,0,0.20);
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 40px 24px 16px;
      text-align: center;
    }

    .header-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 8px 24px var(--primary-glow);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .header p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Content ── */
    .content {
      padding: 12px 24px 28px;
    }

    /* ── Input ── */
    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      height: 50px;
      padding: 0 16px;
      font-size: 18px;
      font-weight: 500;
      font-family: inherit;
      background: #f5f6f7;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      text-align: center;
      letter-spacing: 3px;
      transition: var(--transition);
      color: var(--text);
      caret-color: var(--primary);
      -moz-appearance: textfield;
    }

    .input-wrap input::placeholder {
      color: var(--text-tertiary);
      letter-spacing: 0;
      font-weight: 400;
      font-size: 16px;
    }

    .input-wrap input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .input-wrap input::-webkit-outer-spin-button,
    .input-wrap input::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    .input-wrap.error input {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(225,112,85,0.15);
    }

    .input-wrap.success input {
      border-color: var(--success);
      box-shadow: 0 0 0 3px rgba(0,184,148,0.12);
    }

    .hint {
      display: none;
      font-size: 12px;
      margin-top: 6px;
      padding-left: 2px;
      animation: hintIn 0.15s ease-out;
    }

    @keyframes hintIn {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hint.show { display: block; }
    .hint.error { color: var(--red); }
    .hint.success { color: var(--success); }

    /* ── Button ── */
    .btn {
      width: 100%;
      height: 48px;
      margin-top: 20px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), #a29bfe);
      color: #fff;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px var(--primary-glow);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
    }

    .btn.loading .spinner {
      display: inline-block;
      animation: spin 0.6s linear infinite;
    }

    .btn.loading .btn-text {
      opacity: 0.7;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Result ── */
    .result {
      display: none;
      margin-top: 20px;
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
      animation: resultIn 0.35s ease-out;
    }

    @keyframes resultIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result.show { display: block; }

    .result .icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 10px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .result h3 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .result p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .result .name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-top: 10px;
      letter-spacing: 2px;
    }

    .result .seat {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 16px;
      background: #f0f0ff;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--primary);
    }

    .result .time {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
    }

    .result-success {
      background: var(--success-bg);
      border: 1px solid rgba(0,184,148,0.15);
    }
    .result-success .icon { background: rgba(0,184,148,0.18); color: var(--success); }

    .result-already {
      background: var(--warning-bg);
      border: 1px solid rgba(253,203,110,0.15);
    }
    .result-already .icon { background: rgba(253,203,110,0.18); color: var(--warning); }

    .result-error {
      background: var(--red-bg);
      border: 1px solid rgba(225,112,85,0.15);
    }
    .result-error .icon { background: rgba(225,112,85,0.18); color: var(--red); }

    .result .register-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--primary), #a29bfe);
      color: #fff;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
    }

    .result .register-link:hover {
      box-shadow: 0 6px 16px var(--primary-glow);
      transform: translateY(-1px);
    }

    /* ── Footer ── */
    .footer {
      padding: 0 24px 22px;
      text-align: center;
    }

    .footer p {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* ── Loading ── */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,15,26,0.60);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .loading-overlay.show { display: flex; }

    .loading-overlay .box {
      background: #fff;
      padding: 32px 40px;
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px rgba(0,0,0,0.20);
      text-align: center;
    }

    .loading-overlay .box .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 12px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .loading-overlay .box span {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* ── Status ── */
    .status-badge {
      position: fixed;
      top: 14px;
      right: 14px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .status-badge.show { opacity: 1; }
    .status-badge.connected { background: var(--success-bg); color: var(--success); }
    .status-badge.disconnected { background: var(--red-bg); color: var(--red); }

    /* ── Responsive ── */
    @media (max-width: 400px) {
      body { padding: 12px; }
      .header { padding: 32px 20px 12px; }
      .content { padding: 8px 20px 24px; }
      .header-icon { width: 44px; height: 44px; font-size: 18px; }
      .header h1 { font-size: 18px; }
      .input-wrap input { height: 46px; font-size: 16px; }
      .btn { height: 46px; font-size: 14px; }
      .result { padding: 16px; }
    }
  </style>
</head>
<body>

  <div id="statusBadge" class="status-badge">系统中</div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="box">
      <div class="spinner"></div>
      <span id="loadingText">处理中…</span>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="header">
        <div class="header-icon">✓</div>
        <h1 id="eventTitle">现场签到</h1>
        <p id="eventDesc">请输入报名时填写的手机号</p>
      </div>

      <div class="content">
        <form id="signinForm" novalidate>
          <div class="input-wrap" id="inputWrap">
            <input
              type="tel"
              id="phone"
              placeholder="输入手机号"
              maxlength="16"
              autocomplete="tel"
              inputmode="tel"
            />
          </div>
          <div id="hint" class="hint"></div>

          <button type="submit" class="btn" id="submitBtn">
            <span class="spinner"></span>
            <span class="btn-text">立即签到</span>
          </button>
        </form>

        <div id="result" class="result"></div>
      </div>

      <div class="footer">
        <p id="tableName">如有疑问，请联系现场工作人员</p>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    const params = new URLSearchParams(window.location.search);
    const TOKEN = params.get('app') || '';
    const TABLE = params.get('table') || '';
    let submitting = false;

    const form = document.getElementById('signinForm');
    const input = document.getElementById('phone');
    const inputWrap = document.getElementById('inputWrap');
    const hint = document.getElementById('hint');
    const btn = document.getElementById('submitBtn');
    const result = document.getElementById('result');
    const overlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const badge = document.getElementById('statusBadge');
    const title = document.getElementById('eventTitle');
    const footer = document.getElementById('tableName');

    const clean = (v) => v.trim().replace(/[\s\-()]+/g, '');
    const vMsg = (v) => {
      const c = clean(v);
      if (!c) return '请输入手机号码';
      if (!/^\+?\d+$/.test(c)) return '手机号格式不正确';
      if (c.length < 7) return '手机号位数不足';
      if (c.length > 15) return '手机号过长';
      return '';
    };

    const showHint = (text, type) => {
      hint.className = 'hint show ' + type;
      hint.textContent = text;
      inputWrap.className = 'input-wrap ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : '');
    };

    const clearHint = () => {
      hint.className = 'hint';
      inputWrap.className = 'input-wrap';
    };

    input.addEventListener('input', () => {
      const err = vMsg(input.value);
      if (err) showHint(err, 'error');
      else if (clean(input.value).length >= 7) showHint('手机号格式正确', 'success');
      else clearHint();
    });

    input.addEventListener('blur', () => {
      if (!input.value.trim()) clearHint();
      else { const err = vMsg(input.value); if (err) showHint(err, 'error'); }
    });

    const showResult = (status, msg, name, seat, time, regUrl) => {
      const map = {
        success:     { icon: '✓', title: '签到成功',     cls: 'result-success' },
        already:     { icon: '⏰', title: '已签到',       cls: 'result-already' },
        not_found:   { icon: '?',  title: '未找到报名信息', cls: 'result-error' }
      };
      const m = map[status] || { icon: '✕', title: '签到失败', cls: 'result-error' };

      let html = `<div class="icon">${m.icon}</div><h3>${m.title}</h3><p>${msg}</p>`;
      if (name) html += `<div class="name">${name}</div>`;
      if (seat) html += `<div class="seat">${seat}</div>`;
      if (time) html += `<div class="time">${time}</div>`;
      if (status === 'not_found' && regUrl) {
        html += `<div><a class="register-link" href="${regUrl}" target="_blank" rel="noopener">去报名</a></div>`;
      }

      result.className = 'result show ' + m.cls;
      result.innerHTML = html;
      if (status === 'success' || status === 'already') form.style.display = 'none';
    };

    const setLoading = (show, text) => {
      if (show) {
        loadingText.textContent = text || '处理中…';
        overlay.classList.add('show');
        btn.disabled = true; btn.classList.add('loading');
      } else {
        overlay.classList.remove('show');
        btn.disabled = false; btn.classList.remove('loading');
      }
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (submitting) return;

      const phone = clean(input.value);
      const err = vMsg(input.value);
      if (err) { showHint(err, 'error'); input.focus(); return; }

      submitting = true;
      setLoading(true, '正在查询…');

      try {
        const body = { phone, bitable_token: TOKEN };
        if (TABLE) body.table_id = TABLE;
        const res = await fetch(API + '/api/signin', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const d = await res.json();
        setLoading(false); clearHint();
        showResult(d.status, d.message, d.name, d.seat, d.first_signin_time, d.register_form_url);
      } catch {
        setLoading(false);
        showResult('error', '网络异常，请检查后重试');
      } finally { submitting = false; }
    });

    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') form.requestSubmit(); });
    input.addEventListener('paste', () => {
      setTimeout(() => { if (!vMsg(input.value) && clean(input.value).length >= 7) form.requestSubmit(); }, 50);
    });

    // Init
    (async () => {
      if (TOKEN) {
        try {
          const body = { bitable_token: TOKEN };
          if (TABLE) body.table_id = TABLE;
          const res = await fetch(API + '/api/config', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const d = await res.json();
          if (d.success && d.table_name) {
            title.textContent = d.table_name;
            footer.textContent = d.table_name;
          }
        } catch (e) { console.error(e); }
      }

      try {
        const res = await fetch(API + '/health');
        const d = await res.json();
        badge.className = 'status-badge show connected';
        badge.textContent = '系统正常';
      } catch {
        badge.className = 'status-badge show disconnected';
        badge.textContent = '连接异常';
      }

      setTimeout(() => { badge.classList.remove('show'); input.focus(); }, 2500);
    })();
  </script>
</body>
</html>
