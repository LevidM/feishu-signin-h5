<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3370ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>现场签到</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --blue: #3370ff;
      --blue-hover: #2860e8;
      --blue-light: #f0f5ff;
      --green: #00b365;
      --green-light: #e8faf0;
      --orange: #ff7a00;
      --orange-light: #fff3e6;
      --red: #f53f3f;
      --red-light: #ffecec;
      --text: #1d2129;
      --text-secondary: #4e5969;
      --text-tertiary: #86909c;
      --border: #e5e6eb;
      --bg: #f5f6f7;
      --card: #ffffff;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 8px;
      --radius-card: 12px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
      background: #f0ebe3;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 50% 30%, rgba(200,180,160,0.20) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 32px 24px 20px;
      text-align: center;
    }

    .header-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, var(--blue-light), #d6e4ff);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }

    .header p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Content ── */
    .content {
      padding: 4px 24px 24px;
    }

    /* ── Input ── */
    .form-group {
      margin-bottom: 0;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      font-size: 16px;
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      text-align: center;
      letter-spacing: 2px;
      transition: var(--transition);
      background: #fff;
      color: var(--text);
      caret-color: var(--blue);
      -moz-appearance: textfield;
    }

    .input-wrap input::-webkit-outer-spin-button,
    .input-wrap input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .input-wrap input::placeholder {
      color: var(--text-tertiary);
      letter-spacing: 0;
    }

    .input-wrap input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(51,112,255,0.12);
    }

    .input-wrap.error input {
      border-color: var(--red);
    }

    .input-wrap.error input:focus {
      box-shadow: 0 0 0 2px rgba(245,63,63,0.12);
    }

    .input-wrap.success input {
      border-color: var(--green);
    }

    .hint {
      display: none;
      font-size: 12px;
      margin-top: 6px;
      padding-left: 2px;
      animation: hintIn 0.15s ease-out;
    }

    @keyframes hintIn {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hint.show { display: block; }
    .hint.error { color: var(--red); }
    .hint.success { color: var(--green); }

    /* ── Button ── */
    .btn {
      width: 100%;
      height: 44px;
      margin-top: 20px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--blue-hover);
    }

    .btn-primary:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
    }

    .btn.loading .spinner {
      display: inline-block;
      animation: spin 0.6s linear infinite;
    }

    .btn.loading .btn-text {
      opacity: 0.7;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Result ── */
    .result {
      display: none;
      margin-top: 20px;
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
      animation: resultIn 0.3s ease-out;
    }

    @keyframes resultIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result.show { display: block; }

    .result .icon {
      width: 44px;
      height: 44px;
      margin: 0 auto 10px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .result h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .result p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .result .name {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-top: 10px;
    }

    .result .seat {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 14px;
      background: var(--blue-light);
      color: var(--blue);
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
    }

    .result .time {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
    }

    /* Result variants */
    .result-success { background: var(--green-light); }
    .result-success .icon { background: rgba(0,179,101,0.12); color: var(--green); }

    .result-already { background: var(--orange-light); }
    .result-already .icon { background: rgba(255,122,0,0.12); color: var(--orange); }

    .result-error { background: var(--red-light); }
    .result-error .icon { background: rgba(245,63,63,0.12); color: var(--red); }

    /* Register link */
    .result .register-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 9px 22px;
      background: var(--blue);
      color: #fff;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: var(--transition);
    }

    .result .register-link:hover {
      background: var(--blue-hover);
    }

    /* ── Footer ── */
    .footer {
      padding: 0 24px 20px;
      text-align: center;
    }

    .footer p {
      font-size: 12px;
      color: #b8aba0;
    }

    /* ── Loading overlay ── */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(29,33,41,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .loading-overlay.show {
      display: flex;
    }

    .loading-overlay .box {
      background: #fff;
      padding: 28px 36px;
      border-radius: var(--radius-card);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      text-align: center;
    }

    .loading-overlay .box .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 10px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .loading-overlay .box span {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* ── Status badge ── */
    .status-badge {
      position: fixed;
      top: 12px;
      right: 12px;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }

    .status-badge.show { opacity: 1; }
    .status-badge.connected { background: var(--green-light); color: var(--green); }
    .status-badge.disconnected { background: var(--red-light); color: var(--red); }

    /* ── Responsive ── */
    @media (max-width: 400px) {
      body { padding: 12px; }
      .header { padding: 24px 16px 16px; }
      .content { padding: 0 16px 20px; }
      .header-icon { width: 40px; height: 40px; font-size: 18px; }
      .header h1 { font-size: 16px; }
      .input-wrap input { height: 44px; font-size: 15px; }
      .btn { height: 42px; font-size: 14px; margin-top: 16px; }
      .result { padding: 16px; }
    }
  </style>
</head>
<body>

  <div id="statusBadge" class="status-badge">系统中</div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="box">
      <div class="spinner"></div>
      <span id="loadingText">处理中…</span>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="header">
        <div class="header-icon" id="headerIcon">📋</div>
        <h1 id="eventTitle">现场签到</h1>
        <p id="eventDesc">请输入报名时填写的手机号</p>
      </div>

      <div class="content">
        <form id="signinForm" novalidate>
          <div class="form-group">
            <div class="input-wrap" id="inputWrap">
              <input
                type="tel"
                id="phone"
                placeholder="请输入手机号"
                maxlength="16"
                autocomplete="tel"
                inputmode="tel"
              />
            </div>
            <div id="hint" class="hint"></div>
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">
            <span class="spinner"></span>
            <span class="btn-text">立即签到</span>
          </button>
        </form>

        <div id="result" class="result"></div>
      </div>

      <div class="footer">
        <p id="tableName">如有疑问，请联系现场工作人员</p>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    const params = new URLSearchParams(window.location.search);
    const TOKEN = params.get('app') || '';
    const TABLE = params.get('table') || '';
    let submitting = false;

    const form = document.getElementById('signinForm');
    const input = document.getElementById('phone');
    const inputWrap = document.getElementById('inputWrap');
    const hint = document.getElementById('hint');
    const btn = document.getElementById('submitBtn');
    const result = document.getElementById('result');
    const overlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const badge = document.getElementById('statusBadge');
    const title = document.getElementById('eventTitle');
    const footer = document.getElementById('tableName');

    // ── Validation ──
    const cleanPhone = (v) => v.trim().replace(/[\s\-()]+/g, '');
    const isDigits = (v) => /^\+?\d+$/.test(v);

    const vMsg = (v) => {
      const cleaned = cleanPhone(v);
      if (!cleaned) return '请输入手机号码';
      if (!isDigits(cleaned)) return '手机号格式不正确';
      if (cleaned.length < 7) return '手机号位数不足';
      if (cleaned.length > 15) return '手机号过长';
      return '';
    };

    const showHint = (text, type) => {
      hint.className = 'hint show ' + type;
      hint.textContent = text;
      if (type === 'error') inputWrap.className = 'input-wrap error';
      else if (type === 'success') inputWrap.className = 'input-wrap success';
      else inputWrap.className = 'input-wrap';
    };

    const clearHint = () => {
      hint.className = 'hint';
      inputWrap.className = 'input-wrap';
    };

    input.addEventListener('input', () => {
      const err = vMsg(input.value);
      if (err) showHint(err, 'error');
      else if (cleanPhone(input.value).length >= 7) showHint('手机号格式正确', 'success');
      else clearHint();
    });

    input.addEventListener('blur', () => {
      if (!input.value.trim()) clearHint();
      else {
        const err = vMsg(input.value);
        if (err) showHint(err, 'error');
      }
    });

    // ── Init ──
    (async () => {
      if (TOKEN) {
        try {
          const body = { bitable_token: TOKEN };
          if (TABLE) body.table_id = TABLE;
          const res = await fetch(API + '/api/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const d = await res.json();
          if (d.success && d.table_name) {
            title.textContent = d.table_name;
            footer.textContent = d.table_name;
          }
        } catch (e) { console.error(e); }
      }

      try {
        const res = await fetch(API + '/health');
        const d = await res.json();
        badge.className = 'status-badge show connected';
        badge.textContent = '系统正常';
      } catch {
        badge.className = 'status-badge show disconnected';
        badge.textContent = '连接异常';
      }

      setTimeout(() => {
        badge.classList.remove('show');
        input.focus();
      }, 2500);
    })();

    // ── Sign-in ──
    const showResult = (status, msg, name, seat, time, regUrl) => {
      const icons = { success: '✓', already: '⏰', not_found: '?' };
      const titles = { success: '签到成功', already: '已签到', not_found: '未找到报名信息' };
      const cls = { success: 'result-success', already: 'result-already', not_found: 'result-error' };

      const icon = icons[status] || '✕';
      const t = titles[status] || '签到失败';
      const c = cls[status] || 'result-error';

      let html = `<div class="icon">${icon}</div><h3>${t}</h3><p>${msg}</p>`;
      if (name) html += `<div class="name">${name}</div>`;
      if (seat) html += `<div class="seat">${seat}</div>`;
      if (time) html += `<div class="time">${time}</div>`;
      if (status === 'not_found' && regUrl) {
        html += `<div><a class="register-link" href="${regUrl}" target="_blank" rel="noopener">去报名</a></div>`;
      }

      result.className = 'result show ' + c;
      result.innerHTML = html;

      if (status === 'success' || status === 'already') form.style.display = 'none';
    };

    const setLoading = (show, text) => {
      if (show) {
        loadingText.textContent = text || '处理中…';
        overlay.classList.add('show');
        btn.disabled = true;
        btn.classList.add('loading');
      } else {
        overlay.classList.remove('show');
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (submitting) return;

      const phone = cleanPhone(input.value);
      const err = vMsg(input.value);
      if (err) { showHint(err, 'error'); input.focus(); return; }

      submitting = true;
      setLoading(true, '正在查询…');

      try {
        const body = { phone, bitable_token: TOKEN };
        if (TABLE) body.table_id = TABLE;
        const res = await fetch(API + '/api/signin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const d = await res.json();
        setLoading(false);
        clearHint();
        showResult(d.status, d.message, d.name, d.seat, d.first_signin_time, d.register_form_url);
      } catch {
        setLoading(false);
        showResult('error', '网络异常，请检查后重试');
      } finally {
        submitting = false;
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') form.requestSubmit();
    });

    input.addEventListener('paste', () => {
      setTimeout(() => {
        if (!vMsg(input.value) && cleanPhone(input.value).length >= 7) form.requestSubmit();
      }, 50);
    });
  </script>
</body>
</html>
